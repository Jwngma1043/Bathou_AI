version: '3.8'
services:
  backend:
    build: ./backend
    container_name: bathou-backend
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: bathou-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
